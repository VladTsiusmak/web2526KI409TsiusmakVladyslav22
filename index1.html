<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Server</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #f5f5f5;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            color: #00bcd4;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.8);
        }

        .container {
            background: rgba(30, 30, 30, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 188, 212, 0.4);
            display: inline-block;
            margin: auto;
            border: 1px solid #444;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(0, 188, 212, 0.7);
        }

        strong {
            color: #ff4081;
            text-shadow: 0 0 5px rgba(255, 64, 129, 0.7);
        }

        p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>IoT Lab #1</h1>
    <p>Пристрій: <strong>ESP32 Mini</strong></p>
    <p>Статус: <strong>Online</strong></p>
    <p>Файлова система: <strong>LittleFS</strong></p>
    <div class="footer">Built for Embedded Systems</div>
</div>
</body>
</html>
